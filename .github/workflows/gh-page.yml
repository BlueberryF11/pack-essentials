name: github pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install tinygo
        run: |
          wget https://github.com
          sudo dpkg -i tinygo_0.31.2_amd64.deb

      - name: build wasm
        run: chmod +x build_wasm.sh && ./build_wasm.sh

      - name: install
        run: npm ci

      - name: build
        run: npm run build

      - name: copy index
        run: |
          cp dist/index.html dist/encrypt.html
          cp dist/index.html dist/decrypt.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
